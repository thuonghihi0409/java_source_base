spring.application.name=demo

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/demo_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# Server Configuration
server.port=8080

# JWT (HS256 — dùng chuỗi đủ dài, tối thiểu 256 bit cho secret)
jwt.secret=mySecretKey123456789012345678901234567890
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# Hệ thống tìm việc — URL frontend để gắn vào link xác thực email / đặt lại mật khẩu
app.frontend-base-url=http://localhost:3000
# Link xac thuc email trong email (GET backend)
app.backend-public-url=http://localhost:8080
app.auth.require-email-verification-for-login=true

# Tao tai khoan admin lan dau (de trong = khong tao tu dong)
app.bootstrap.admin-email=
app.bootstrap.admin-password=

# Gui email: them spring.mail.host (vd: smtp.gmail.com) va user/password khi can.
# Khi chua cau hinh SMTP, ung dung chi log link ra console (xem EmailService).
spring.mail.from=noreply@jobportal.local

# Logging Configuration
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.enabled=true
springdoc.show-actuator=false
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json